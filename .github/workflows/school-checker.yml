name: Zoe School Website Checker

on:
  schedule:
    # 01:00 UTC every Monday = 09:00 HKT every Monday.
    - cron: '0 1 * * 1'
  workflow_dispatch: {}   # allow manual "Run workflow" from the Actions tab

permissions:
  contents: write   # commit updated crawl-state.json / crawl-log.md
  issues: write     # open an issue when a change is detected

concurrency:
  group: zoe-school-checker
  cancel-in-progress: false

jobs:
  check-schools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Connect HK VPN (Surfshark WireGuard) — optional
        continue-on-error: true
        env:
          WG_CONF: ${{ secrets.SURFSHARK_WG_CONF }}
        run: |
          if [ -z "$WG_CONF" ]; then
            echo "SURFSHARK_WG_CONF secret not set — crawling from the runner's own IP."
            exit 0
          fi
          sudo apt-get update -qq
          sudo apt-get install -y wireguard-tools openresolv
          umask 077
          echo "$WG_CONF" | sudo tee /etc/wireguard/hk.conf >/dev/null
          if sudo wg-quick up hk; then
            echo "VPN up. Exit country: $(curl -s --max-time 15 https://ipinfo.io/country || echo '?')"
          else
            echo "wg-quick failed — continuing on the runner's own IP."
            sudo wg-quick down hk 2>/dev/null || true
          fi

      - name: Run school checker
        id: check
        run: python .github/scripts/check_schools.py

      - name: Disconnect HK VPN
        if: always()
        run: sudo wg-quick down hk 2>/dev/null || true

      - name: Commit updated crawl state & log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add zoe-school/data/crawl-state.json zoe-school/data/crawl-log.md zoe-school/data/schools.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore(zoe-school): weekly crawl $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Open issue if changes detected
        if: steps.check.outputs.changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="Zoe school update detected — $(date -u +%Y-%m-%d)"
          gh issue create --title "$TITLE" --body-file issue-body.md --label "zoe-school" \
            || gh issue create --title "$TITLE" --body-file issue-body.md
