name: Zoe School AI Checker

on:
  schedule:
    # 02:00 UTC every Monday = 10:00 HKT (after the regex checker at 09:00).
    - cron: '0 2 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: zoe-school-ai-checker
  cancel-in-progress: false

jobs:
  ai-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install claude-agent-sdk requests beautifulsoup4

      - name: Connect HK VPN (Surfshark WireGuard) — optional
        continue-on-error: true
        env:
          WG_CONF: ${{ secrets.SURFSHARK_WG_CONF }}
        run: |
          if [ -z "$WG_CONF" ]; then
            echo "SURFSHARK_WG_CONF secret not set — crawling from the runner's own IP."
            exit 0
          fi
          sudo apt-get update -qq
          # ubuntu-24.04 ships resolvconf (not openresolv); wg-quick needs it for the conf's DNS line.
          sudo apt-get install -y wireguard-tools resolvconf || sudo apt-get install -y wireguard-tools
          umask 077
          echo "$WG_CONF" | sudo tee /etc/wireguard/hk.conf >/dev/null
          if sudo wg-quick up hk; then
            echo "VPN up. Exit country: $(curl -s --max-time 15 https://ipinfo.io/country || echo '?')"
          else
            echo "wg-quick failed — continuing on the runner's own IP."
            sudo wg-quick down hk 2>/dev/null || true
          fi

      # Phase 1 — fetch pages through the HK VPN (some HK school sites geo-block
      # non-HK IPs). No Claude API calls here, so the HK exit IP is fine.
      - name: Fetch school pages (VPN up)
        continue-on-error: true
        env:
          ZOE_CACHE_DIR: /tmp/zoe_pages
          PYTHONUTF8: '1'
          PYTHONIOENCODING: utf-8
        run: python .github/scripts/ai_check.py --fetch-only

      # Anthropic does not serve Hong Kong: a HK exit IP gets every Claude API
      # call 403'd. Drop the VPN before extraction so the API uses the US runner IP.
      - name: Disconnect HK VPN
        if: always()
        run: sudo wg-quick down hk 2>/dev/null || true

      # Phase 2 — extract from the cached pages with the VPN down.
      - name: Run AI checker
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          MS_TENANT_ID: ${{ secrets.MS_TENANT_ID }}
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET: ${{ secrets.MS_CLIENT_SECRET }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          BCC_EMAIL: ${{ secrets.BCC_EMAIL }}
          ZOE_CACHE_DIR: /tmp/zoe_pages
          ZOE_AI_EMAIL: '1'
          ZOE_AI_MODEL: claude-sonnet-4-6
          PYTHONUTF8: '1'
          PYTHONIOENCODING: utf-8
        run: python .github/scripts/ai_check.py

      - name: Commit updated schools.json & AI state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add zoe-school/data/schools.json zoe-school/data/ai-state.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(zoe-school): weekly AI crawl $(date -u +%Y-%m-%d)"
            # The regex checker (school-checker.yml) can land its own commit on
            # master while this run is in flight — rebase and retry instead of
            # letting a non-fast-forward push drop this run's results.
            for i in 1 2 3 4 5; do
              git fetch origin master
              git rebase origin/master && git push origin HEAD:master && break
              echo "Push attempt $i failed (likely a race with another workflow) — retrying..."
              sleep 5
            done
          fi
